# ypc devtools — configuración GLOBAL del proyecto
#
# Este archivo define los defaults que se aplican a TODOS los targets
# del proyecto. Las URLs y los metadatos específicos de cada target viven
# en targets/<slug>/target.conf y pueden sobreescribir estos defaults.
#
# Formato: pares clave=valor, compatibles con `source` en Bash.
# Comentarios con '#'. No hay sustitución de variables.

# ─── Target por defecto ──────────────────────────────────────
# Slug del target que se usa cuando los comandos se ejecutan sin --target.
# Debe existir en targets/<slug>/. Cambia editando este archivo o con:
# ypc devtools target rename <viejo> <nuevo>
YPC_DEVTOOLS_DEFAULT_TARGET="principal"

# ─── Viewport por defecto ────────────────────────────────────
# Tamaño del navegador que Claude usará al auditar cualquier target.
# Cada target puede sobreescribirlo en su target.conf si lo necesita
# (por ejemplo, un target mobile-only con 375x812).
# Valores típicos:
#   1366x900    portátil HD+  (default)
#   1920x1080   Full HD
#   1280x800    MacBook 13"
#   375x812     iPhone X/11/12
#   360x740     Android medio
YPC_DEVTOOLS_VIEWPORT="1366x900"

# ─── Retención de reportes ───────────────────────────────────
# Cuántos reportes conservar por target al ejecutar
# `ypc devtools reportes --limpiar` sin argumento. Se aplica por-target:
# si tienes 5 targets y retención=10, puedes tener hasta 50 reportes.
YPC_DEVTOOLS_RETENCION_N="10"

# Archivado automático al limpiar reportes: antes de borrar, comprime la
# carpeta a <archivo_dir>/<nombre>.tar.gz. Desactivar con "false" para
# borrar sin archivar (recupera espacio total).
YPC_DEVTOOLS_ARCHIVAR="true"
# Ruta del archivo. Vacío → targets/<slug>/archivo/ junto a reports/.
YPC_DEVTOOLS_ARCHIVO_DIR=""

# ─── Criterios de aceptación ─────────────────────────────────
# Claude los tiene en cuenta al generar informes: si se incumplen,
# marcará el rastreo como "con hallazgos".
YPC_DEVTOOLS_MAX_ERRORES_CONSOLA="0"   # 0 = tolerancia cero
YPC_DEVTOOLS_MAX_REQUESTS_FALLIDAS="0" # requests con status >= 400
YPC_DEVTOOLS_LIGHTHOUSE_MIN_PERF="70"  # score mínimo de performance
YPC_DEVTOOLS_LIGHTHOUSE_MIN_A11Y="90"  # score mínimo de accesibilidad
YPC_DEVTOOLS_LIGHTHOUSE_MIN_SEO="90"   # score mínimo de SEO
YPC_DEVTOOLS_LIGHTHOUSE_MIN_BP="85"    # score mínimo de best practices

# Diff: cuántos puntos tiene que bajar un score para contar como regresión.
# Margen pequeño para absorber ruido normal entre runs de Lighthouse.
YPC_DEVTOOLS_DIFF_SCORE_THRESHOLD="3"

# ─── Flujos prioritarios ─────────────────────────────────────
# Lista (separada por espacios) de rutas del sitio que merece probar
# siempre en un "smoke test completo". Claude las recorrerá en orden.
# Ejemplo: "/ /contacto /productos /acerca"
YPC_DEVTOOLS_RUTAS_SMOKE="/"

# ─── Avanzado ────────────────────────────────────────────────
# Timeout por navegación (milisegundos). Sube si el sitio es lento.
YPC_DEVTOOLS_TIMEOUT_MS="15000"

# Modo del Chrome dedicado al arrancar con `ypc devtools chrome on`:
#   headless        sin ventana visible (ideal para CI o servidor)
#   headed          con ventana (útil para ver lo que Claude está haciendo)
YPC_DEVTOOLS_CHROME_MODO="headless"
