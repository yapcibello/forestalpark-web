# ypc devtools — configuración del target principal
#
# Este archivo define los metadatos y URLs del target principal.
# Se sourcea DESPUÉS de ../../config.conf (global), así que cualquier
# variable aquí sobreescribe el default global solo para este target.
#
# Formato: pares clave=valor, compatibles con `source` en Bash.

# ─── Metadatos del target ────────────────────────────────────
# Nombre legible (para informes y listados). Puede contener espacios.
YPC_DEVTOOLS_TARGET_NOMBRE="principal"

# Descripción corta: qué se audita en este target (1-2 líneas).
# Útil para distinguirlo del resto cuando hay muchos targets en un proyecto.
YPC_DEVTOOLS_TARGET_DESCRIPCION="Target principal"

# ─── URLs del target ─────────────────────────────────────────
# URL primaria del target. Es la que se usa al crear un reporte
# si no pasas --url explícito en `ypc devtools nuevo`.
YPC_DEVTOOLS_TARGET_URL=""

# URLs de entornos alternativos (opcionales). Storage para el día
# que quieras comparar prod vs staging vs dev del mismo target.
# Hoy solo son campos informativos; v2 añadirá flag --entorno.
YPC_DEVTOOLS_TARGET_URL_STAGING=""
YPC_DEVTOOLS_TARGET_URL_DEV=""

# ─── Overrides opcionales del config global ──────────────────
# Si descomenta alguna de estas, solo se aplica a este target.
# Útil cuando un target tiene criterios distintos al resto del proyecto.

# YPC_DEVTOOLS_VIEWPORT="375x812"              # este target se prueba en móvil
# YPC_DEVTOOLS_RETENCION_N="20"                # target importante: más reportes
# YPC_DEVTOOLS_MAX_ERRORES_CONSOLA="5"         # este target tolera 5 errores
# YPC_DEVTOOLS_LIGHTHOUSE_MIN_PERF="50"        # este target es pesado, baja el umbral
# YPC_DEVTOOLS_RUTAS_SMOKE="/ /checkout"       # rutas smoke específicas
